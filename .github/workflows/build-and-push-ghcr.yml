name: Build and Push Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/herfel97/testopenshiftups
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false

      - name: Verify image tag exists
        run: docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Update deploy image tag
        run: |
          sed -i "s|newTag:.*|newTag: \"${{ env.IMAGE_TAG }}\"|" deploy/overlays/k3s/kustomization.yaml

      - name: Commit deploy tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: deploy image ${{ env.IMAGE_TAG }} [skip ci]"
          file_pattern: deploy/overlays/k3s/kustomization.yaml
