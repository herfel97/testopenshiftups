name: Build and Push Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/herfel97/testopenshiftups
  IMAGE_TAG: ${{ github.sha }}
  ARGOCD_APP: test

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false

      - name: Verify image tag exists
        run: docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/download/v2.14.2/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Deploy via Argo CD
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_INSECURE: ${{ secrets.ARGOCD_INSECURE }}
        run: |
          set -euo pipefail

          LOGIN_ARGS=(--auth-token "${ARGOCD_AUTH_TOKEN}" --grpc-web)
          CMD_ARGS=(--grpc-web)

          # Cert issued for hostname, not IP → TLS fails unless --insecure.
          # CI cannot answer "Proceed insecurely (y/n)?" → fatal EOF without this.
          USE_INSECURE=false
          if [ "${ARGOCD_INSECURE:-false}" = "true" ]; then
            USE_INSECURE=true
          elif echo "${ARGOCD_SERVER}" | grep -qE '^([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]+)?$'; then
            echo "::warning::ARGOCD_SERVER is an IP; using --insecure. Prefer a hostname + valid cert, or set secret ARGOCD_INSECURE=true."
            USE_INSECURE=true
          fi

          if [ "${USE_INSECURE}" = "true" ]; then
            LOGIN_ARGS+=(--insecure)
            CMD_ARGS+=(--insecure)
          fi

          argocd login "${ARGOCD_SERVER}" "${LOGIN_ARGS[@]}"

          argocd app set "${ARGOCD_APP}" \
            --kustomize-image "test=${IMAGE_NAME}:${IMAGE_TAG}" \
            "${CMD_ARGS[@]}"

          argocd app sync "${ARGOCD_APP}" "${CMD_ARGS[@]}" --prune
          argocd app wait "${ARGOCD_APP}" "${CMD_ARGS[@]}" --health --timeout 600
