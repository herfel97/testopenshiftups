name: Build and Push Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/herfel97/testopenshiftups
  IMAGE_TAG: ${{ github.sha }}
  ARGOCD_APP: test

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          provenance: false
          sbom: false

      - name: Verify image tag exists
        run: docker pull ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Install Argo CD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/download/v2.14.2/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/argocd

      - name: Deploy via Argo CD
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
          ARGOCD_USERNAME: ${{ secrets.ARGOCD_USERNAME }}
          ARGOCD_PASSWORD: ${{ secrets.ARGOCD_PASSWORD }}
          ARGOCD_INSECURE: ${{ secrets.ARGOCD_INSECURE }}
        run: |
          set -euo pipefail

          if [ -z "${ARGOCD_SERVER:-}" ]; then
            echo "::error::GitHub secret ARGOCD_SERVER is empty or not set."
            exit 1
          fi

          # host[:port] only — no https://, no trailing slash
          SERVER="${ARGOCD_SERVER#https://}"
          SERVER="${SERVER#http://}"
          SERVER="${SERVER%%/*}"
          export ARGOCD_SERVER="${SERVER}"

          USE_INSECURE=false
          if [ "${ARGOCD_INSECURE:-false}" = "true" ]; then
            USE_INSECURE=true
          elif echo "${ARGOCD_SERVER}" | grep -qE '^([0-9]{1,3}\.){3}[0-9]{1,3}(:[0-9]+)?$'; then
            echo "::warning::ARGOCD_SERVER is an IP; using --insecure."
            USE_INSECURE=true
          fi

          CMD_ARGS=(--grpc-web)
          if [ "${USE_INSECURE}" = "true" ]; then
            CMD_ARGS+=(--insecure)
          fi
          export ARGOCD_OPTS="${CMD_ARGS[*]}"

          if [ -n "${ARGOCD_AUTH_TOKEN:-}" ]; then
            export ARGOCD_AUTH_TOKEN
            echo "Authenticating with ARGOCD_AUTH_TOKEN (non-interactive)."
          elif [ -n "${ARGOCD_USERNAME:-}" ] && [ -n "${ARGOCD_PASSWORD:-}" ]; then
            echo "Authenticating with username/password."
            argocd login "${ARGOCD_SERVER}" \
              --username "${ARGOCD_USERNAME}" \
              --password "${ARGOCD_PASSWORD}" \
              "${CMD_ARGS[@]}"
          else
            echo "::error::ARGOCD_AUTH_TOKEN is empty. Generate a token in Argo CD UI:"
            echo "  User Settings → Accounts → test (or admin) → Generate New Token"
            echo "Then add it as GitHub secret ARGOCD_AUTH_TOKEN."
            exit 1
          fi

          # Update live image parameter; auto-sync (see application.yaml) deploys it.
          # No manual "app sync" — avoids "another operation is already in progress".
          argocd app set "${ARGOCD_APP}" \
            --kustomize-image "test=${IMAGE_NAME}:${IMAGE_TAG}" \
            "${CMD_ARGS[@]}"

          argocd app wait "${ARGOCD_APP}" "${CMD_ARGS[@]}" --sync --health --timeout 600
