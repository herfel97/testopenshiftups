name: Build and Push Image to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/herfel97/testopenshiftups

jobs:
  build-and-push:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false

      - name: Verify image tag exists
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update deploy image tag
        run: |
          sed -i "s|newTag:.*|newTag: \"${{ github.sha }}\"|" deploy/overlays/k3s/kustomization.yaml

      - name: Commit deploy tag
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: deploy image ${{ github.sha }} [skip ci]"
          file_pattern: deploy/overlays/k3s/kustomization.yaml
