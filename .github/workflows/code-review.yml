# Solo se ejecuta al abrir/actualizar un Pull Request hacia main.
# No corre con push directo a main (usa build-and-push-ghcr.yml para eso).
# Requiere el secret MODEL_API_KEY en Settings > Secrets and variables > Actions.
name: Code Review

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches:
      - main

permissions:
  pull-requests: write
  contents: read

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    steps:
      - name: AI code review
        uses: murtuzaalisurti/better@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          ai-model-api-key: ${{ secrets.MODEL_API_KEY }}
          platform: openai
          delete-existing-review-by-bot: true
          filesToIgnore: "**/*.env; .husky/**; .cache/**"
          rules: |-
            -- It must follow industry standard best practices
            -- It should be idiomatic
            -- It should be readable
            -- It should not contain any security related vulnerabilities
            -- It should not contain any sensitive data
            -- It should be well structured
            -- It should not contain bad patterns
